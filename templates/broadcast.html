<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Broadcast microphone — Live Translation Bridge</title>
    <link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml">
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #0f1115; color: #e8eaed; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 1.5rem;
        }
        main { width: 100%; max-width: 440px; }
        h1 { font-size: 1.25rem; margin: 0 0 0.25rem; }
        .sub { color: #9aa0a6; font-size: 0.85rem; margin: 0 0 1.5rem; }
        .card { background: #1b1e24; border: 1px solid #2a2e36; border-radius: 14px; padding: 1.5rem; }
        button {
            width: 100%; padding: 0.9rem 1rem; font-size: 1rem; font-weight: 600;
            border: none; border-radius: 10px; cursor: pointer; color: #fff;
            background: #2563eb; transition: background 0.15s;
        }
        button:hover { background: #1d4ed8; }
        button.live { background: #dc2626; }
        button.live:hover { background: #b91c1c; }
        button:disabled { background: #3a3f48; cursor: not-allowed; color: #888; }
        .status { margin: 1rem 0 0; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #6b7280; flex: none; }
        .dot.on { background: #22c55e; }
        .dot.err { background: #ef4444; }
        .meter { height: 8px; background: #2a2e36; border-radius: 6px; overflow: hidden; margin-top: 1rem; }
        .meter > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg,#22c55e,#eab308,#ef4444); transition: width 0.08s; }
        .log { margin-top: 1rem; font-size: 0.78rem; color: #9aa0a6; max-height: 140px; overflow: auto; white-space: pre-wrap; }
        .warn { background: #3b2f12; border: 1px solid #6b5418; color: #fbbf24; padding: 0.75rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1rem; }
        a { color: #60a5fa; }
        .foot { margin-top: 1.25rem; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>
    <main id="broadcast" data-ws-token="{{ ws_token }}" data-audio-source="{{ audio_source }}">
        <h1>Broadcast microphone</h1>
        <p class="sub">Capture this device's microphone and stream it to the translation server.</p>

        <div class="card">
            <div id="modeWarning" class="warn" hidden>
                The server is running with <code>AUDIO_SOURCE={{ audio_source }}</code>.
                Browser streaming is ignored unless <code>AUDIO_SOURCE=network</code>.
            </div>
            <button id="toggle" type="button">Start broadcasting</button>
            <div class="status"><span id="dot" class="dot"></span><span id="statusText">Idle</span></div>
            <div class="meter"><i id="meterBar"></i></div>
            <div id="log" class="log" aria-live="polite"></div>
        </div>

        <p class="foot"><a href="/admin">← Back to admin panel</a></p>
    </main>
    <script src="/static/broadcast.js" defer></script>
</body>
</html>
