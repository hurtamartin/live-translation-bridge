<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#eef3f8" media="(prefers-color-scheme: light)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Live Překlad</title>
  <link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <button class="header__btn" id="themeToggle" type="button" aria-label="Přepnout motiv">
      <span class="header__icon" id="themeIcon" aria-hidden="true">&#9790;</span>
    </button>

    <div class="header__status" id="statusIndicator" role="status" aria-live="polite">
      <span class="status__dot" id="statusDot"></span>
      <span class="status__text" id="statusText"></span>
    </div>

    <button class="header__btn" id="settingsToggle" type="button" aria-label="Nastavení">
      <span class="header__icon" aria-hidden="true">&#9881;</span>
    </button>
  </header>

  <!-- Subtitles container -->
  <main class="subtitles" id="subtitlesContainer">
    <div class="subtitles__empty" id="emptyState">
      <div class="empty__icon">&#127908;</div>
      <p class="empty__text" data-i18n="waitingForTranslation"></p>
    </div>
  </main>

  <!-- Language selector FAB -->
  <button class="fab" id="langFab" type="button" aria-label="Změnit jazyk">
    <span class="fab__icon" aria-hidden="true">&#127760;</span>
    <span class="fab__label" id="fabLabel">CZ</span>
  </button>

  <!-- Language modal (options built dynamically in app.js) -->
  <div class="modal-overlay" id="langModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="langModalTitle">
      <h2 class="modal__title" id="langModalTitle" data-i18n="selectLanguage"></h2>
      <div class="modal__options" id="langOptions">
        <!-- Populated by app.js from LANGUAGES config -->
      </div>
      <button class="modal__close" id="langModalClose" type="button" data-i18n="close"></button>
    </div>
  </div>

  <!-- Settings drawer -->
  <div class="modal-overlay" id="settingsModal" aria-hidden="true">
    <div class="modal modal--settings" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
      <h2 class="modal__title" id="settingsModalTitle" data-i18n="settings"></h2>

      <div class="setting">
        <label class="setting__label" for="fontSizeSlider" data-i18n="fontSize"></label>
        <input type="range" class="setting__slider" id="fontSizeSlider" min="16" max="64" value="28">
        <span class="setting__value" id="fontSizeValue">28px</span>
      </div>

      <div class="setting">
        <label class="setting__label">
          <input type="checkbox" class="setting__checkbox" id="showTimestamps">
          <span data-i18n="showTimestamps"></span>
        </label>
      </div>

      <div class="setting">
        <label class="setting__label" for="maxSubtitles" data-i18n="subtitleCount"></label>
        <select class="setting__select" id="maxSubtitles">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
      </div>

      <div class="setting">
        <a href="#qr" class="setting__link" id="showQrLink" data-i18n="showQrCode"></a>
      </div>

      <button class="modal__close" id="settingsModalClose" type="button" data-i18n="close"></button>
    </div>
  </div>

  <!-- QR page overlay -->
  <div class="qr-overlay" id="qrOverlay" aria-hidden="true">
    <div class="qr-page" role="dialog" aria-modal="true" aria-labelledby="qrPageTitle">
      <h1 class="qr-page__title" id="qrPageTitle" data-i18n="qrPageTitle"></h1>
      <div class="qr-page__code">
        <img src="/api/qr.svg" alt="QR kód" id="qrImage">
      </div>
      <p class="qr-page__instruction" data-i18n="qrInstruction"></p>
      <p class="qr-page__url" id="pageUrl"></p>
      <button class="qr-page__close" id="qrClose" type="button" data-i18n="close"></button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
